databaseChangeLog:
  - changeSet:
      id: 17012026-migrate-is-active-to-status
      author: bogdan_lopatenko
      changes:
        - update:
            tableName: users
            columns:
              - column:
                  name: status
                  value: ACTIVE
            where: is_active = true

        - update:
            tableName: users
            columns:
              - column:
                  name: status
                  value: NEED_EMAIL_APPROVING
            where: is_active = false