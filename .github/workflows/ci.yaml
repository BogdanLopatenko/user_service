name: Spring Boot CI/CD

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

jobs:

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Run unit tests
        run: ./mvnw clean test


  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest

    needs:
      - unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Run integration tests
        run: ./mvnw verify